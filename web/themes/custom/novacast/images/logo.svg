<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 36" width="160" height="36" role="img" aria-label="NovaCast">
  <title>NovaCast</title>

  <!-- Signal arc icon -->
  <g fill="none" stroke="#1860D4" stroke-linecap="round">
    <!-- Outer arc -->
    <path d="M6 28 A16 16 0 0 1 30 28" stroke-width="2.5" opacity="0.45"/>
    <!-- Middle arc -->
    <path d="M10 28 A11 11 0 0 1 26 28" stroke-width="2.5" opacity="0.7"/>
    <!-- Inner arc -->
    <path d="M14 28 A6 6 0 0 1 22 28" stroke-width="2.5"/>
    <!-- Centre dot -->
    <circle cx="18" cy="28" r="2.2" fill="#1860D4" stroke="none"/>
    <!-- Uplink beam -->
    <line x1="18" y1="4" x2="18" y2="16" stroke-width="2" stroke="#0EA5E9" opacity="0.8"/>
    <polygon points="18,2 15.5,8 20.5,8" fill="#0EA5E9" opacity="0.8"/>
  </g>

  <!-- NOVA wordmark -->
  <text x="36" y="23"
        font-family="'Sora', system-ui, sans-serif"
        font-size="17"
        font-weight="700"
        letter-spacing="-0.3"
        fill="#0D2545">NOVA</text>

  <!-- CAST wordmark -->
  <text x="82" y="23"
        font-family="'Sora', system-ui, sans-serif"
        font-size="17"
        font-weight="300"
        letter-spacing="1.5"
        fill="#1860D4">CAST</text>

  <!-- Tagline -->
  <text x="36" y="32"
        font-family="'Space Mono', monospace"
        font-size="5.5"
        letter-spacing="2"
        fill="#5B7592">ONEBAND SYSTEM</text>
</svg>
