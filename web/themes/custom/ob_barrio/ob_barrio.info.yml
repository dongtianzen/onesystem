name: OB Barrio
type: theme
description: 'A modern corporate Bootstrap 5 subtheme for Bootstrap Barrio.'
package: Custom
core_version_requirement: ^9 || ^10 || ^11
base theme: bootstrap_barrio

libraries:
  - ob_barrio/global
  - ob_barrio/global-styling
  - ob_barrio/google-fonts

libraries-override:
  bootstrap_barrio/bootstrap_cdn:
    js:
      //cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js: vendor/bootstrap/bootstrap.bundle.min.js
    css:
      component:
        //cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css: vendor/bootstrap/bootstrap.min.css

regions:
  header: Header
  primary_menu: 'Primary menu'
  secondary_menu: 'Secondary menu'
  hero: Hero
  hero_visual: 'Hero Visual'
  highlighted: Highlighted
  breadcrumb: Breadcrumb
  content: Content
  sidebar_first: 'Sidebar first'
  sidebar_second: 'Sidebar second'
  features: 'Features / Products'
  solutions: Solutions
  services: Services
  partners: Partners
  footer_first: 'Footer first'
  footer_second: 'Footer second'
  footer_third: 'Footer third'
  footer_fourth: 'Footer fourth'
  footer_bottom: 'Footer bottom'
