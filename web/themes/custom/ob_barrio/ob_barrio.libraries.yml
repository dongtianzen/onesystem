global:
  version: 1.x
  css:
    theme:
      libraries/bootstrap/css/bootstrap.min.css: { minified: true }
      css/style.css: {}
  js:
    libraries/bootstrap/js/bootstrap.bundle.min.js: { minified: true }
    js/global.js: {}
  dependencies:
    - core/drupal
    - core/once

global-styling:
  version: 1.x
  css:
    base:
      css/design-tokens.css: {}
      css/typography.css: {}
    layout:
      css/navigation.css: {}
      css/hero.css: {}
      css/cards.css: {}
      css/buttons.css: {}
      css/footer.css: {}
  js:
    js/ob_barrio.js: {}
  dependencies:
    - core/drupal
    - core/jquery
    - core/once

google-fonts:
  version: external
  css:
    base:
      'https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap': { type: external, minified: true }
