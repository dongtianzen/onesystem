<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Arial, 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2F7FD"/>
      <stop offset="1" stop-color="#E1EAF8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#AEC4E8"/>
    </pattern>
    <linearGradient id="dish" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1D4ED8" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)" opacity="0.55"/>
  <ellipse cx="400" cy="215" rx="330" ry="200" fill="url(#glow)"/>

  <!-- signal arcs -->
  <g stroke-linecap="round" fill="none">
    <path d="M 468 148 A 52 52 0 0 1 520 200" stroke="#F59E42" stroke-width="8"/>
    <path d="M 480 108 A 94 94 0 0 1 574 202" stroke="#60A5FA" stroke-width="8"/>
    <path d="M 492 68 A 136 136 0 0 1 628 204" stroke="#BFD5F2" stroke-width="8"/>
  </g>

  <!-- dish on card -->
  <g filter="url(#soft)">
    <rect x="238" y="118" width="240" height="240" rx="28" fill="#FFFFFF"/>
  </g>
  <g>
    <ellipse cx="352" cy="232" rx="76" ry="54" fill="#EAF1FB" stroke="url(#dish)" stroke-width="7" transform="rotate(-38 352 232)"/>
    <ellipse cx="352" cy="232" rx="44" ry="31" fill="none" stroke="#93B4E8" stroke-width="4" transform="rotate(-38 352 232)"/>
    <line x1="352" y1="232" x2="405" y2="181" stroke="url(#dish)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="405" cy="181" r="10" fill="#F59E42"/>
    <path d="M 358 278 L 358 322 M 328 322 L 388 322" stroke="url(#dish)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- floating pills -->
  <g filter="url(#soft)" font-size="17" font-weight="bold" letter-spacing="1">
    <rect x="128" y="96" width="96" height="40" rx="20" fill="#FFFFFF"/>
    <text x="176" y="122" text-anchor="middle" fill="#2563EB">5G</text>
    <rect x="546" y="300" width="126" height="40" rx="20" fill="#1D4ED8"/>
    <text x="609" y="326" text-anchor="middle" fill="#FFFFFF">LIVE</text>
  </g>

  <!-- small decorative dots -->
  <circle cx="176" cy="330" r="7" fill="#F59E42"/>
  <circle cx="640" cy="120" r="5" fill="#60A5FA"/>
  <circle cx="676" cy="150" r="3.5" fill="#BFD5F2"/>
</svg>
