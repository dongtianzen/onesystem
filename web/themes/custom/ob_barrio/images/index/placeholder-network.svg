<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Arial, 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2F7FD"/>
      <stop offset="1" stop-color="#E1EAF8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#AEC4E8"/>
    </pattern>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1D4ED8" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)" opacity="0.55"/>
  <ellipse cx="400" cy="215" rx="330" ry="200" fill="url(#glow)"/>

  <!-- links -->
  <g stroke="#93B4E8" stroke-width="5" fill="none" opacity="0.9">
    <path d="M 238 140 C 300 160 340 190 366 210"/>
    <path d="M 238 316 C 300 296 340 262 366 242"/>
    <path d="M 562 140 C 500 160 460 190 434 210"/>
    <path d="M 562 316 C 500 296 460 262 434 242"/>
  </g>
  <!-- packet dots on links -->
  <circle cx="300" cy="166" r="6" fill="#F59E42"/>
  <circle cx="498" cy="288" r="6" fill="#F59E42"/>

  <!-- corner node cards -->
  <g filter="url(#soft)">
    <rect x="190" y="104" width="96" height="72" rx="18" fill="#FFFFFF"/>
    <rect x="190" y="280" width="96" height="72" rx="18" fill="#FFFFFF"/>
    <rect x="514" y="104" width="96" height="72" rx="18" fill="#FFFFFF"/>
    <rect x="514" y="280" width="96" height="72" rx="18" fill="#FFFFFF"/>
  </g>
  <!-- node icons: camera, monitor, server, antenna -->
  <g stroke="#3B6FD4" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- camera -->
    <rect x="214" y="126" width="34" height="26" rx="6"/>
    <path d="M 248 134 L 264 126 L 264 152 L 248 144"/>
    <!-- monitor -->
    <rect x="536" y="122" width="52" height="34" rx="6"/>
    <line x1="562" y1="156" x2="562" y2="164"/>
    <line x1="548" y1="164" x2="576" y2="164"/>
    <!-- server -->
    <rect x="214" y="298" width="48" height="16" rx="5"/>
    <rect x="214" y="322" width="48" height="16" rx="5"/>
    <!-- antenna -->
    <line x1="562" y1="344" x2="562" y2="316"/>
    <path d="M 546 312 A 22 22 0 0 1 578 312"/>
    <circle cx="562" cy="316" r="4" fill="#3B6FD4"/>
  </g>

  <!-- center hub: globe -->
  <g filter="url(#soft)">
    <circle cx="400" cy="226" r="58" fill="url(#blue)"/>
  </g>
  <g stroke="#FFFFFF" stroke-width="4" fill="none" opacity="0.95">
    <circle cx="400" cy="226" r="34"/>
    <ellipse cx="400" cy="226" rx="15" ry="34"/>
    <line x1="366" y1="226" x2="434" y2="226"/>
  </g>
  <circle cx="443" cy="184" r="9" fill="#F59E42" stroke="#FFFFFF" stroke-width="4"/>

  <!-- floating pill -->
  <g filter="url(#soft)" font-size="16" font-weight="bold" letter-spacing="1">
    <rect x="336" y="330" width="128" height="40" rx="20" fill="#FFFFFF"/>
    <text x="400" y="356" text-anchor="middle" fill="#2563EB">IP MEDIA</text>
  </g>

  <circle cx="668" cy="220" r="5" fill="#60A5FA"/>
  <circle cx="140" cy="226" r="7" fill="#BFD5F2"/>
</svg>
