<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Arial, 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2F7FD"/>
      <stop offset="1" stop-color="#E1EAF8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#AEC4E8"/>
    </pattern>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1D4ED8" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)" opacity="0.55"/>
  <ellipse cx="400" cy="215" rx="330" ry="200" fill="url(#glow)"/>

  <!-- scope card -->
  <g filter="url(#soft)">
    <rect x="170" y="100" width="460" height="260" rx="24" fill="#FFFFFF"/>
  </g>
  <!-- header bar -->
  <circle cx="204" cy="132" r="6" fill="#F59E42"/>
  <circle cx="226" cy="132" r="6" fill="#60A5FA"/>
  <circle cx="248" cy="132" r="6" fill="#DCE6F5"/>
  <rect x="536" y="120" width="70" height="24" rx="12" fill="#EAF1FB"/>
  <rect x="552" y="129" width="38" height="6" rx="3" fill="#93B4E8"/>

  <!-- grid -->
  <g stroke="#E4ECF8" stroke-width="2">
    <line x1="196" y1="200" x2="604" y2="200"/>
    <line x1="196" y1="250" x2="604" y2="250"/>
    <line x1="196" y1="300" x2="604" y2="300"/>
    <line x1="298" y1="164" x2="298" y2="332"/>
    <line x1="400" y1="164" x2="400" y2="332"/>
    <line x1="502" y1="164" x2="502" y2="332"/>
  </g>

  <!-- waveform area fill -->
  <path d="M 196 250
           L 250 250 L 268 196 L 288 296 L 306 250
           L 356 250 L 376 172 L 400 322 L 424 216 L 442 250
           L 496 250 L 514 208 L 534 288 L 552 250
           L 604 250 L 604 332 L 196 332 Z" fill="url(#fill)"/>
  <!-- waveform stroke -->
  <path d="M 196 250
           L 250 250 L 268 196 L 288 296 L 306 250
           L 356 250 L 376 172 L 400 322 L 424 216 L 442 250
           L 496 250 L 514 208 L 534 288 L 552 250
           L 604 250"
        fill="none" stroke="url(#wave)" stroke-width="6.5" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="604" cy="250" r="9" fill="#1D4ED8"/>
  <circle cx="604" cy="250" r="17" fill="none" stroke="#60A5FA" stroke-width="4" opacity="0.6"/>

  <!-- floating badge -->
  <g filter="url(#soft)" font-size="16" font-weight="bold" letter-spacing="1">
    <rect x="560" y="76" width="110" height="40" rx="20" fill="#1D4ED8"/>
    <text x="615" y="102" text-anchor="middle" fill="#FFFFFF">4K/IP</text>
  </g>

  <circle cx="146" cy="330" r="7" fill="#F59E42"/>
  <circle cx="662" cy="342" r="5" fill="#60A5FA"/>
</svg>
