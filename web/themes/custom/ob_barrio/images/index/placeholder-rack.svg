<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Arial, 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2F7FD"/>
      <stop offset="1" stop-color="#E1EAF8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#AEC4E8"/>
    </pattern>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1D4ED8" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)" opacity="0.55"/>
  <ellipse cx="400" cy="215" rx="330" ry="200" fill="url(#glow)"/>

  <!-- rack tower -->
  <g filter="url(#soft)">
    <rect x="250" y="88" width="300" height="286" rx="22" fill="#FFFFFF"/>
  </g>
  <!-- rails -->
  <line x1="278" y1="108" x2="278" y2="354" stroke="#E4ECF8" stroke-width="4"/>
  <line x1="522" y1="108" x2="522" y2="354" stroke="#E4ECF8" stroke-width="4"/>
  <g fill="#C7D7F0">
    <circle cx="278" cy="126" r="4.5"/><circle cx="278" cy="200" r="4.5"/><circle cx="278" cy="274" r="4.5"/><circle cx="278" cy="340" r="4.5"/>
    <circle cx="522" cy="126" r="4.5"/><circle cx="522" cy="200" r="4.5"/><circle cx="522" cy="274" r="4.5"/><circle cx="522" cy="340" r="4.5"/>
  </g>

  <!-- unit 1: highlighted processor -->
  <rect x="296" y="112" width="208" height="66" rx="12" fill="url(#blue)"/>
  <circle cx="320" cy="145" r="7" fill="#F59E42"/>
  <circle cx="342" cy="145" r="7" fill="#93C5FD"/>
  <rect x="362" y="139" width="60" height="12" rx="6" fill="#FFFFFF" opacity="0.4"/>
  <g fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.9">
    <circle cx="446" cy="145" r="9"/>
    <circle cx="474" cy="145" r="9"/>
  </g>

  <!-- unit 2 -->
  <rect x="296" y="190" width="208" height="66" rx="12" fill="#EAF1FB"/>
  <g fill="none" stroke="#3B6FD4" stroke-width="4">
    <circle cx="322" cy="223" r="9"/><circle cx="350" cy="223" r="9"/><circle cx="378" cy="223" r="9"/><circle cx="406" cy="223" r="9"/>
  </g>
  <rect x="430" y="211" width="54" height="24" rx="6" fill="none" stroke="#3B6FD4" stroke-width="4"/>
  <circle cx="322" cy="245" r="0"/>

  <!-- unit 3 -->
  <rect x="296" y="268" width="208" height="66" rx="12" fill="#EAF1FB"/>
  <g stroke="#93B4E8" stroke-width="5" stroke-linecap="round">
    <line x1="318" y1="292" x2="418" y2="292"/>
    <line x1="318" y1="310" x2="386" y2="310"/>
  </g>
  <circle cx="466" cy="301" r="11" fill="none" stroke="#3B6FD4" stroke-width="5"/>
  <circle cx="466" cy="301" r="3.5" fill="#F59E42"/>

  <!-- floating badge -->
  <g filter="url(#soft)" font-size="16" font-weight="bold" letter-spacing="1">
    <rect x="486" y="66" width="96" height="40" rx="20" fill="#FFFFFF"/>
    <text x="534" y="92" text-anchor="middle" fill="#2563EB">3RU</text>
  </g>

  <!-- cable curve -->
  <path d="M 550 300 C 620 300 640 240 640 180" fill="none" stroke="#93B4E8" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 12"/>
  <circle cx="640" cy="172" r="7" fill="#F59E42"/>
  <circle cx="182" cy="140" r="5" fill="#60A5FA"/>
  <circle cx="160" cy="316" r="7" fill="#BFD5F2"/>
</svg>
